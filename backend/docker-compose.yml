version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: resusensei_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ResuSenseiDB
    networks:
      - resusensei_network

  # FastAPI Application
  api:
    build: .
    container_name: resusensei_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - DB_NAME=ResuSenseiDB
      - ENVIRONMENT=production
    depends_on:
      - mongodb
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - resusensei_network

  # Redis (Optional - for caching and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: resusensei_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - resusensei_network

volumes:
  mongodb_data:
  redis_data:

networks:
  resusensei_network:
    driver: bridge